<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hunch – Amplified</title>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --green: #a8ffd1;        /* softened from acid #9eff83 — harmonises with card */
    --green-btn: #7effc0;
    --bg: #242424;
    --card-bg: rgba(255,255,255,0.12);
    --font: 'DM Sans', system-ui, sans-serif;
  }

  body {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: var(--font);
  }

  .frame {
    width: 390px;
    height: 844px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border-radius: 48px;
    box-shadow: 0 40px 120px rgba(0,0,0,0.6);
  }

  /* Status bar */
  .status-bar {
    height: 54px;
    padding: 16px 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .status-time {
    font-size: 15px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: -0.3px;
  }
  .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-icons svg { opacity: 0.9; }

  /* Main area */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px 16px 12px;
    gap: 12px;
    overflow: hidden;
  }

  /* Headline */
  .headline {
    padding: 4px 0 8px;
  }
  .headline p {
    font-size: 31px;
    font-weight: 500;
    line-height: 1.25;
    color: var(--green);
    letter-spacing: -0.5px;
  }
  .headline p em {
    font-style: normal;
    font-weight: 300;
    color: rgba(168,255,209,0.7); /* green at 70% — creates the weight contrast more intentionally */
  }

  /* Card */
  .card {
    flex: 1;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 20px;
  }
  .card-gradient {
    position: absolute;
    inset: 0;
    background: radial-gradient(
      ellipse at 50% 30%,
      #7a8fbe 0%,
      #8fafc4 30%,
      #9acfc0 60%,
      #a8f0cc 100%    /* green-end echoes headline green */
    );
  }
  .card-overlay {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 20px;
  }

  .card-top {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1;
  }
  .pill {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 100px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 400;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.1px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .card-body {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 10px;
    padding: 24px 8px;
  }
  .card-title {
    font-size: 30px;
    font-weight: 500;
    color: #fff;
    line-height: 1.2;
    letter-spacing: -0.4px;
  }
  .card-sub {
    font-size: 17px;
    font-weight: 400;
    color: rgba(255,255,255,0.75);
    line-height: 1.5;
  }

  /* Hint */
  .card-hint {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 0 4px 4px;
  }
  .hint-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .hint-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    flex-shrink: 0;
  }
  .hint-text {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
    line-height: 1.3;
  }

  /* Talk button */
  .card-bottom {
    position: relative;
    z-index: 1;
    padding-top: 16px;
  }
  .talk-btn {
    width: 100%;
    height: 56px;
    border-radius: 100px;
    background: var(--green);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s ease;
  }
  .talk-btn:hover { opacity: 0.92; }
  .talk-btn span {
    font-size: 16px;
    font-weight: 500;
    color: #1a2e1e;
    letter-spacing: -0.2px;
    font-family: var(--font);
  }
  .mic-icon {
    width: 18px;
    height: 18px;
    opacity: 0.6;
  }

  /* Nav */
  .nav {
    flex-shrink: 0;
    padding: 0 16px 8px;
  }
  .nav-inner {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px;
    padding: 5px;
    display: flex;
    align-items: center;
    height: 60px;
  }
  .nav-item {
    flex: 1;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 100px;
    font-size: 15px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    cursor: pointer;
    transition: color 0.15s;
  }
  .nav-item.active {
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #ffffff;
    font-weight: 500;
  }

  /* Home indicator */
  .home-indicator {
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding-bottom: 8px;
  }
  .home-bar {
    width: 134px;
    height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 100px;
  }
</style>
</head>
<body>
<div class="frame">

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="11" viewBox="0 0 17 11" fill="none">
        <rect x="0" y="4" width="3" height="7" rx="1" fill="white"/>
        <rect x="4.5" y="2.5" width="3" height="8.5" rx="1" fill="white"/>
        <rect x="9" y="0.5" width="3" height="10.5" rx="1" fill="white"/>
        <rect x="13.5" y="0" width="3" height="11" rx="1" fill="white" opacity="0.3"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 2.5C10.2 2.5 12.2 3.4 13.6 4.9L15 3.5C13.2 1.6 10.7 0.5 8 0.5C5.3 0.5 2.8 1.6 1 3.5L2.4 4.9C3.8 3.4 5.8 2.5 8 2.5Z" fill="white"/>
        <path d="M8 5.5C9.5 5.5 10.8 6.1 11.8 7.1L13.2 5.7C11.8 4.4 10 3.5 8 3.5C6 3.5 4.2 4.4 2.8 5.7L4.2 7.1C5.2 6.1 6.5 5.5 8 5.5Z" fill="white"/>
        <circle cx="8" cy="10.5" r="1.5" fill="white"/>
      </svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
        <rect x="0" y="1" width="21" height="10" rx="3" stroke="white" stroke-opacity="0.35" stroke-width="1"/>
        <rect x="1.5" y="2.5" width="18" height="7" rx="2" fill="white"/>
        <path d="M22.5 4V8C23.3 7.6 24 6.4 24 6C24 5.6 23.3 4.4 22.5 4Z" fill="white" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Headline -->
    <div class="headline">
      <p>Heeey Mia!<br>What hunch do you <em>have today?</em></p>
    </div>

    <!-- Card -->
    <div class="card">
      <div class="card-gradient"></div>
      <div class="card-overlay"></div>

      <div class="card-top">
        <span class="pill">18 Sep 2025</span>
        <span class="pill">New idea ✨</span>
      </div>

      <div class="card-body">
        <div class="card-title">Dump your<br>idea here</div>
        <div class="card-sub">Give me your hunch.<br>What problem, who, why now?</div>
      </div>

      <!-- Prompt hints — fills the dead space with meaning -->
      <div class="card-hint">
        <div class="hint-row">
          <div class="hint-dot"></div>
          <span class="hint-text">Who has this problem?</span>
        </div>
        <div class="hint-row">
          <div class="hint-dot"></div>
          <span class="hint-text">Why does it matter now?</span>
        </div>
      </div>

      <div class="card-bottom">
        <button class="talk-btn">
          <svg class="mic-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="9" y="2" width="6" height="12" rx="3" fill="#1a2e1e"/>
            <path d="M5 11C5 14.866 8.13401 18 12 18C15.866 18 19 14.866 19 11" stroke="#1a2e1e" stroke-width="2" stroke-linecap="round"/>
            <line x1="12" y1="18" x2="12" y2="22" stroke="#1a2e1e" stroke-width="2" stroke-linecap="round"/>
            <line x1="9" y1="22" x2="15" y2="22" stroke="#1a2e1e" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span>Talk your hunch</span>
        </button>
      </div>
    </div>

    <!-- Nav -->
    <div class="nav">
      <div class="nav-inner">
        <div class="nav-item">Sparks</div>
        <div class="nav-item active">Start</div>
        <div class="nav-item">Make</div>
      </div>
    </div>
  </div>

  <!-- Home indicator -->
  <div class="home-indicator">
    <div class="home-bar"></div>
  </div>

</div>
</body>
</html>
